<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  ::selection { background: #C7D0B6; color: #2E2620; }
  input::placeholder { color: #A99C88; }
  @keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</helmet>
<div style="min-height: 100vh; background: #F5F1E8; font-family: 'Public Sans', sans-serif; color: #2E2620; display: flex; justify-content: center;">
  <div style="width: 100%; max-width: 620px; display: flex; flex-direction: column; min-height: 100vh; position: relative;">

    <!-- Header -->
    <header style="padding: 54px 28px 30px; text-align: center;">
      <div style="font-family: 'Newsreader', serif; font-weight: 500; font-size: 30px; letter-spacing: 0.02em; color: #3A2E24;">Inspire</div>
      <div style="margin-top: 8px; font-size: 13.5px; color: #9C8E7C; letter-spacing: 0.01em;">한 줄로 남기는 오늘의 독서</div>
      <div style="width: 26px; height: 1px; background: #8A9A7B; margin: 20px auto 0; opacity: 0.6;"></div>
    </header>

    <!-- Sort toggle -->
    <div style="display: flex; align-items: center; gap: 18px; padding: 0 30px 8px;">
      <button onClick="{{ setPopular }}" style="{{ popularStyle }}">인기순</button>
      <button onClick="{{ setRecent }}" style="{{ recentStyle }}">최신순</button>
      <div style="flex: 1;"></div>
      <span style="font-size: 12px; color: #B0A28E;">{{ count }}개의 기록</span>
    </div>

    <!-- Feed -->
    <main style="flex: 1; padding: 12px 20px 150px; display: flex; flex-direction: column; gap: 14px;">
      <sc-for list="{{ memos }}" as="m" hint-placeholder-count="3">
        <article style="background: #FBF8F1; border: 1px solid #EAE2D2; border-radius: 4px; padding: 26px 26px 20px; box-shadow: 0 1px 2px rgba(58,46,36,0.03); animation: riseIn 0.4s ease both;">
          <p style="font-family: 'Newsreader', serif; font-weight: 400; font-size: 22px; line-height: 1.5; color: #33291F; margin: 0 0 18px; text-wrap: pretty;">{{ m.quote }}</p>
          <div style="display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;">
            <div style="min-width: 0;">
              <div style="font-family: 'Newsreader', serif; font-style: italic; font-size: 14px; color: #6E6151;">『{{ m.book }}』</div>
              <div style="margin-top: 6px; font-size: 11.5px; color: #A99C88; letter-spacing: 0.02em;">{{ m.author }} · {{ m.date }}</div>
            </div>
            <button onClick="{{ m.onLike }}" style="{{ m.likeStyle }}">
              <span style="font-size: 13px;">♡</span>
              <span style="font-size: 12.5px; font-weight: 600;">{{ m.likes }}</span>
            </button>
          </div>
        </article>
      </sc-for>
    </main>

    <!-- Composer -->
    <div style="position: sticky; bottom: 0; padding: 14px 16px 18px; background: linear-gradient(to top, #F5F1E8 72%, rgba(245,241,232,0)); ">
      <div style="background: #FFFDF8; border: 1px solid #E3DAC8; border-radius: 8px; padding: 12px 12px 12px 16px; box-shadow: 0 4px 18px rgba(58,46,36,0.07); display: flex; flex-direction: column; gap: 10px;">
        <input value="{{ draftQuote }}" onInput="{{ onQuote }}" placeholder="마음에 남은 한 구절" style="border: none; outline: none; background: transparent; font-family: 'Newsreader', serif; font-size: 18px; color: #33291F; width: 100%;">
        <div style="display: flex; align-items: center; gap: 10px; border-top: 1px solid #F0E9DA; padding-top: 10px;">
          <input value="{{ draftBook }}" onInput="{{ onBook }}" placeholder="책 제목" style="border: none; outline: none; background: transparent; font-size: 13.5px; color: #6E6151; flex: 1; min-width: 0;">
          <button onClick="{{ onSave }}" style="{{ saveStyle }}">저장</button>
        </div>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    sort: 'popular',
    draftQuote: '',
    draftBook: '',
    memos: [
      { id: 1, quote: '새는 알에서 나오려고 투쟁한다. 알은 세계다.', book: '데미안', author: '느린산책', date: '6월 28일', likes: 42 },
      { id: 2, quote: '가장 중요한 것은 눈에 보이지 않아.', book: '어린 왕자', author: '오후세시', date: '7월 1일', likes: 128 },
      { id: 3, quote: '인간은 파멸당할 수는 있어도 패배하지는 않는다.', book: '노인과 바다', author: '창가의자리', date: '7월 2일', likes: 31 },
      { id: 4, quote: '삶이 그대를 속일지라도 슬퍼하거나 노하지 말라.', book: '푸시킨 시집', author: '밑줄긋는사람', date: '7월 3일', likes: 67 },
    ],
    liked: {},
    seq: 5,
  };

  nicknames = ['한밤의독자', '책장넘기는소리', '조용한오후', '문장수집가', '여백을읽다', '오늘의밑줄', '창밖을보며', '느린페이지'];

  toggleLike = (id) => {
    this.setState(s => {
      const on = !s.liked[id];
      return {
        liked: { ...s.liked, [id]: on },
        memos: s.memos.map(m => m.id === id ? { ...m, likes: m.likes + (on ? 1 : -1) } : m),
      };
    });
  };

  save = () => {
    const q = this.state.draftQuote.trim();
    const b = this.state.draftBook.trim();
    if (!q || !b) return;
    const now = new Date();
    const date = (now.getMonth() + 1) + '월 ' + now.getDate() + '일';
    const author = this.nicknames[Math.floor(Math.random() * this.nicknames.length)];
    this.setState(s => ({
      memos: [{ id: s.seq, quote: q, book: b, author, date, likes: 0, fresh: true }, ...s.memos],
      seq: s.seq + 1,
      draftQuote: '',
      draftBook: '',
      sort: 'recent',
    }));
  };

  renderVals() {
    const s = this.state;
    const sorted = [...s.memos].sort((a, b) => {
      if (s.sort === 'popular') return b.likes - a.likes;
      return (b.fresh ? 1 : 0) - (a.fresh ? 1 : 0) || b.id - a.id;
    });

    const tabBase = 'border: none; background: transparent; cursor: pointer; font-family: inherit; font-size: 13.5px; padding: 4px 0; letter-spacing: 0.01em;';
    const active = tabBase + 'color: #4A5940; font-weight: 600; border-bottom: 1.5px solid #8A9A7B;';
    const idle = tabBase + 'color: #B0A28E; font-weight: 400; border-bottom: 1.5px solid transparent;';

    const canSave = s.draftQuote.trim() && s.draftBook.trim();

    return {
      count: s.memos.length,
      popularStyle: s.sort === 'popular' ? active : idle,
      recentStyle: s.sort === 'recent' ? active : idle,
      setPopular: () => this.setState({ sort: 'popular' }),
      setRecent: () => this.setState({ sort: 'recent' }),
      draftQuote: s.draftQuote,
      draftBook: s.draftBook,
      onQuote: (e) => this.setState({ draftQuote: e.target.value }),
      onBook: (e) => this.setState({ draftBook: e.target.value }),
      onSave: this.save,
      saveStyle: 'border: none; cursor: ' + (canSave ? 'pointer' : 'default') + '; font-family: inherit; font-size: 13px; font-weight: 600; padding: 9px 20px; border-radius: 6px; white-space: nowrap; transition: all 0.2s; ' + (canSave ? 'background: #8A9A7B; color: #FDFCF8;' : 'background: #EDE6D8; color: #C3B7A3;'),
      memos: sorted.map(m => {
        const on = !!s.liked[m.id];
        return {
          ...m,
          onLike: () => this.toggleLike(m.id),
          likeStyle: 'display: flex; align-items: center; gap: 5px; border: 1px solid ' + (on ? '#8A9A7B' : '#E3DAC8') + '; background: ' + (on ? '#EDF1E5' : 'transparent') + '; color: ' + (on ? '#4A5940' : '#A99C88') + '; cursor: pointer; font-family: inherit; padding: 5px 11px; border-radius: 20px; transition: all 0.15s;',
        };
      }),
    };
  }
}
</script>
</body>
</html>
